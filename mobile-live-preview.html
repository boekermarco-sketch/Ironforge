<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Forge - Mobile Live Preview</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#121316;
    color:#e8ece9;
    display:grid;
    grid-template-rows:auto 1fr;
  }
  .toolbar{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    padding:10px 12px;
    border-bottom:1px solid rgba(255,255,255,.08);
    background:#0d0f12;
  }
  .toolbar .hint{
    font-size:12px;color:#a4aea6;margin-left:auto;
  }
  button{
    border:1px solid rgba(120,224,154,.35);
    background:rgba(80,200,120,.14);
    color:#dfffe8;
    border-radius:10px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.02em;
    padding:8px 12px;
    cursor:pointer;
  }
  button:hover{background:rgba(80,200,120,.2)}
  .workspace{
    min-height:0;
    display:grid;
    place-items:center;
    padding:14px;
  }
  .phone-shell{
    width:min(430px,calc(100vw - 24px));
    height:min(900px,calc(100vh - 92px));
    border-radius:48px;
    background:linear-gradient(155deg,#292d31,#15181c);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08),
      0 30px 90px rgba(0,0,0,.58),
      inset 0 1px 0 rgba(255,255,255,.08);
    padding:10px;
    display:flex;
    flex-direction:column;
  }
  .notch-wrap{
    height:28px;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:5px;
    flex-shrink:0;
  }
  .notch{
    width:126px;height:28px;border-radius:20px;
    background:#0a0a0a;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .screen{
    flex:1;min-height:0;border-radius:34px;overflow:hidden;
    background:#000;
    position:relative;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
  }
  iframe{
    width:100%;
    height:100%;
    border:0;
    background:#000;
    display:block;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <button id="btn-reload" type="button">Neu laden</button>
    <button id="btn-hard" type="button">Hard Reload (Cachebuster)</button>
    <button id="btn-session" type="button">Direkt Session-View</button>
    <button id="btn-demo-cat" type="button">Demo-Katalog (10)</button>
    <span class="hint">Live 1:1 aus `training-preview.html` im iPhone-Format</span>
  </div>

  <div class="workspace">
    <div class="phone-shell" aria-label="iPhone Preview">
      <div class="notch-wrap"><div class="notch" aria-hidden="true"></div></div>
      <div class="screen">
        <iframe id="mobile-frame" src="./training-preview.html"></iframe>
      </div>
    </div>
  </div>

<script>
  const frame = document.getElementById('mobile-frame');

  function reloadFrame(cacheBust){
    const base = "./training-preview.html";
    if(cacheBust){
      frame.src = `${base}?preview=${Date.now()}`;
      return;
    }
    frame.src = base;
  }

  document.getElementById('btn-reload').addEventListener('click', ()=>reloadFrame(false));
  document.getElementById('btn-hard').addEventListener('click', ()=>reloadFrame(true));

  document.getElementById('btn-session').addEventListener('click', ()=>{
    const w = frame.contentWindow;
    if(!w) return;
    try{
      if(typeof w.switchMobileView === "function"){
        w.switchMobileView("session");
      } else {
        reloadFrame(true);
      }
    }catch(_err){
      reloadFrame(true);
    }
  });

  document.getElementById('btn-demo-cat').addEventListener('click', ()=>{
    const w = frame.contentWindow;
    if(!w) return;
    try{
      const demoRows = [
        {name:"Bankdrücken",brand:"gym80",cat:"Brust",group:"Brust",target:"brust",sType:"push",art:"Maschine",img:""},
        {name:"Schrägbankpresse",brand:"gym80",cat:"Brust",group:"Brust",target:"brust",sType:"push",art:"Maschine",img:""},
        {name:"Butterfly",brand:"matrix",cat:"Brust",group:"Brust Isolation",target:"brust",sType:"push",art:"Maschine",img:""},
        {name:"Latzug breit",brand:"matrix",cat:"Rücken",group:"Lat",target:"rucken",sType:"pull",art:"Maschine",img:""},
        {name:"Sitzrudern",brand:"matrix",cat:"Rücken",group:"Rudern",target:"rucken",sType:"pull",art:"Maschine",img:""},
        {name:"Schulterpresse",brand:"gym80",cat:"Schulter",group:"Schulter",target:"schulter",sType:"push",art:"Maschine",img:""},
        {name:"Beinpresse",brand:"egym",cat:"Beine",group:"Quadrizeps",target:"beine",sType:"legs",art:"Maschine",img:""},
        {name:"Beinstrecker",brand:"egym",cat:"Beine",group:"Quadrizeps",target:"beine",sType:"legs",art:"Maschine",img:""},
        {name:"Beinbeuger",brand:"egym",cat:"Beine",group:"Hamstrings",target:"beine",sType:"legs",art:"Maschine",img:""},
        {name:"Bizepscurls",brand:"freihantel",cat:"Arme",group:"Bizeps",target:"arme",sType:"pull",art:"Kurzhantel",img:""}
      ];
      w.deviceCatalogSnapRows = demoRows;
      w.deviceCatalogImageLoading = false;
      if(typeof w.renderMobilePoolSheet === "function") w.renderMobilePoolSheet();
      if(typeof w.showToast === "function") w.showToast("Demo-Katalog mit 10 Übungen aktiv", "ok");
    }catch(_err){}
  });
</script>
</body>
</html>
